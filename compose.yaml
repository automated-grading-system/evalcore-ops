services:
  postgres:
    image: postgres:16-alpine
    container_name: ags-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ags}
      POSTGRES_USER: ${POSTGRES_USER:-ags}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ags_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ags-postgres-data:/var/lib/postgresql/data
    networks:
      - ags-network
    healthcheck:
      test:
        ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ags-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-ags}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-ags_password}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - ags-rabbitmq-data:/var/lib/rabbitmq
    networks:
      - ags-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ags-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-ags}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-ags_password}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN:-http://localhost:3000,http://localhost:5173}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ags-minio-data:/data
    networks:
      - ags-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: ags-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-ags}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-ags_password}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        mc alias set local http://minio:9000 "$${S3_ACCESS_KEY}" "$${S3_SECRET_KEY}"
        mc mb --ignore-existing local/lab-assets
        mc mb --ignore-existing local/submission-assets
        mc mb --ignore-existing local/evaluation-reports
        mc admin config get local api
    networks:
      - ags-network
    restart: "no"

  identity-service:
    profiles:
      - app
    image: ${IDENTITY_IMAGE:-dorrissdang/evalcore-identity-service:main}
    container_name: ${IDENTITY_CONTAINER_NAME:-ags-identity-service}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      DATABASE_URL: ${IDENTITY_DATABASE_URL:-Host=postgres;Port=5432;Database=ags;Username=ags;Password=ags_password}
      JWT_SECRET: ${JWT_SECRET:-change-me-super-secret-local-dev-only-but-long-enough-123456}
      JWT_ISSUER: ${JWT_ISSUER:-ags}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ags-api}
      JWT_EXPIRES_MINUTES: ${JWT_EXPIRES_MINUTES:-1440}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-[http://localhost:3000,http://localhost:5173]}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-ags}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-ags_password}
    ports:
      - "${IDENTITY_PUBLIC_PORT:-8081}:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ags-network
    restart: unless-stopped
    # The published image may not include curl/wget in its runtime layer.
    # Readiness is verified externally by scripts/smoke-auth-gateway.sh.

  class-service:
    profiles:
      - app
    image: ${CLASS_IMAGE:-dorrissdang/evalcore-class-service:main}
    container_name: ${CLASS_CONTAINER_NAME:-ags-class-service}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      DATABASE_URL: ${CLASS_DATABASE_URL:-Host=postgres;Port=5432;Database=ags;Username=ags;Password=ags_password}
      JWT_SECRET: ${JWT_SECRET:-change-me-super-secret-local-dev-only-but-long-enough-123456}
      JWT_ISSUER: ${JWT_ISSUER:-ags}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ags-api}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-[http://localhost:3000,http://localhost:5173]}
      S3_INTERNAL_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-ags}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-ags_password}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      LAB_ASSETS_BUCKET: ${LAB_ASSETS_BUCKET:-lab-assets}
      PRESIGNED_URL_EXPIRES_MINUTES: ${PRESIGNED_URL_EXPIRES_MINUTES:-15}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-ags}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-ags_password}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-ags.domain.events}
      AUTO_APPLY_MIGRATIONS: ${AUTO_APPLY_MIGRATIONS:-true}
    ports:
      - "${CLASS_PUBLIC_PORT:-8082}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - ags-network
    restart: unless-stopped
    # The published image may not include curl/wget in its runtime layer.
    # Readiness is verified externally by scripts/smoke-auth-gateway.sh.

  submission-service:
    profiles:
      - app
    image: ${SUBMISSION_IMAGE:-dorrissdang/evalcore-submission-service:main}
    container_name: ${SUBMISSION_CONTAINER_NAME:-ags-submission-service}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      DATABASE_URL: ${SUBMISSION_DATABASE_URL:-Host=postgres;Port=5432;Database=ags;Username=ags;Password=ags_password}
      JWT_SECRET: ${JWT_SECRET:-change-me-super-secret-local-dev-only-but-long-enough-123456}
      JWT_ISSUER: ${JWT_ISSUER:-ags}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ags-api}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-[http://localhost:3000,http://localhost:5173]}
      CLASS_SERVICE_BASE_URL: http://class-service:8080
      S3_INTERNAL_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-ags}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-ags_password}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      SUBMISSION_ASSETS_BUCKET: ${SUBMISSION_ASSETS_BUCKET:-submission-assets}
      PRESIGNED_URL_EXPIRES_MINUTES: ${PRESIGNED_URL_EXPIRES_MINUTES:-15}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-ags}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-ags_password}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-ags.domain.events}
      AUTO_APPLY_MIGRATIONS: ${AUTO_APPLY_MIGRATIONS:-true}
    ports:
      - "${SUBMISSION_PUBLIC_PORT:-8083}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      class-service:
        condition: service_started
    networks:
      - ags-network
    restart: unless-stopped
    # The published image may not include curl/wget in its runtime layer.
    # Readiness is verified externally by scripts/smoke-auth-gateway.sh.

  evaluation-service:
    profiles:
      - app
    image: ${EVALUATION_IMAGE:-dorrissdang/evalcore-evaluation-service:main}
    container_name: ${EVALUATION_CONTAINER_NAME:-ags-evaluation-service}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      AUTO_APPLY_MIGRATIONS: ${AUTO_APPLY_MIGRATIONS:-true}
      DATABASE_URL: ${EVALUATION_DATABASE_URL:-Host=postgres;Port=5432;Database=ags;Username=ags;Password=ags_password}
      JWT_SECRET: ${JWT_SECRET:-change-me-super-secret-local-dev-only-but-long-enough-123456}
      JWT_ISSUER: ${JWT_ISSUER:-ags}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ags-api}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-[http://localhost:3000,http://localhost:5173]}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token-change-me}
      CLASS_SERVICE_BASE_URL: http://class-service:8080
      SUBMISSION_SERVICE_BASE_URL: http://submission-service:8080
      S3_INTERNAL_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-ags}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-ags_password}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      LAB_ASSETS_BUCKET: ${LAB_ASSETS_BUCKET:-lab-assets}
      SUBMISSION_ASSETS_BUCKET: ${SUBMISSION_ASSETS_BUCKET:-submission-assets}
      EVALUATION_REPORTS_BUCKET: ${EVALUATION_REPORTS_BUCKET:-evaluation-reports}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-ags}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-ags_password}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-ags.domain.events}
      SUBMISSION_SUBMITTED_ROUTING_KEY: ${SUBMISSION_SUBMITTED_ROUTING_KEY:-submission.submitted.v1}
      EVALUATION_COMPLETED_ROUTING_KEY: ${EVALUATION_COMPLETED_ROUTING_KEY:-evaluation.completed.v1}
      EVALUATION_PROCESS_ROLE: api
    ports:
      - "${EVALUATION_PUBLIC_PORT:-8084}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      class-service:
        condition: service_started
      submission-service:
        condition: service_started
    networks:
      - ags-network
    restart: unless-stopped
    # Deliberately no Docker socket or evaluation workspace mount: this is the public API role.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  evaluation-runner:
    profiles:
      - app
    image: ${EVALUATION_IMAGE:-dorrissdang/evalcore-evaluation-service:main}
    container_name: ${EVALUATION_RUNNER_CONTAINER_NAME:-ags-evaluation-runner}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      AUTO_APPLY_MIGRATIONS: ${AUTO_APPLY_MIGRATIONS:-true}
      DATABASE_URL: ${EVALUATION_DATABASE_URL:-Host=postgres;Port=5432;Database=ags;Username=ags;Password=ags_password}
      JWT_SECRET: ${JWT_SECRET:-change-me-super-secret-local-dev-only-but-long-enough-123456}
      JWT_ISSUER: ${JWT_ISSUER:-ags}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ags-api}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-[http://localhost:3000,http://localhost:5173]}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token-change-me}
      CLASS_SERVICE_BASE_URL: http://class-service:8080
      SUBMISSION_SERVICE_BASE_URL: http://submission-service:8080
      S3_INTERNAL_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: ${S3_PUBLIC_ENDPOINT:-http://localhost:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-ags}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-ags_password}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      LAB_ASSETS_BUCKET: ${LAB_ASSETS_BUCKET:-lab-assets}
      SUBMISSION_ASSETS_BUCKET: ${SUBMISSION_ASSETS_BUCKET:-submission-assets}
      EVALUATION_REPORTS_BUCKET: ${EVALUATION_REPORTS_BUCKET:-evaluation-reports}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-ags}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-ags_password}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-ags.domain.events}
      SUBMISSION_SUBMITTED_ROUTING_KEY: ${SUBMISSION_SUBMITTED_ROUTING_KEY:-submission.submitted.v1}
      EVALUATION_COMPLETED_ROUTING_KEY: ${EVALUATION_COMPLETED_ROUTING_KEY:-evaluation.completed.v1}
      EVALUATION_PROCESS_ROLE: runner
      EVALUATION_RUNNER_CONCURRENCY: ${EVALUATION_RUNNER_CONCURRENCY:-1}
      EVALUATION_WORKDIR: /tmp/evalcore/evaluations
      EVALUATION_APP_SERVICE_NAME: ${EVALUATION_APP_SERVICE_NAME:-app}
      EVALUATION_APP_INTERNAL_PORT: ${EVALUATION_APP_INTERNAL_PORT:-8080}
      EVALUATION_APP_HEALTH_PATH: ${EVALUATION_APP_HEALTH_PATH:-/health}
      EVALUATION_POSTMAN_BASE_URL_VARIABLE: ${EVALUATION_POSTMAN_BASE_URL_VARIABLE:-baseUrl}
      EVALUATION_BUILD_TIMEOUT_SECONDS: ${EVALUATION_BUILD_TIMEOUT_SECONDS:-180}
      EVALUATION_STARTUP_TIMEOUT_SECONDS: ${EVALUATION_STARTUP_TIMEOUT_SECONDS:-90}
      EVALUATION_NEWMAN_TIMEOUT_SECONDS: ${EVALUATION_NEWMAN_TIMEOUT_SECONDS:-120}
      EVALUATION_TOTAL_TIMEOUT_SECONDS: ${EVALUATION_TOTAL_TIMEOUT_SECONDS:-420}
      EVALUATION_CONTAINER_MEMORY_LIMIT: ${EVALUATION_CONTAINER_MEMORY_LIMIT:-768m}
      EVALUATION_CONTAINER_CPUS: ${EVALUATION_CONTAINER_CPUS:-1.0}
      EVALUATION_CONTAINER_PIDS_LIMIT: ${EVALUATION_CONTAINER_PIDS_LIMIT:-256}
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/evalcore/evaluations:/tmp/evalcore/evaluations
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      class-service:
        condition: service_started
      submission-service:
        condition: service_started
      evaluation-service:
        condition: service_healthy
    networks:
      - ags-network
    restart: unless-stopped

  notification-service:
    profiles:
      - app
    image: ${NOTIFICATION_IMAGE:-dorrissdang/evalcore-notification-service:main}
    container_name: ${NOTIFICATION_CONTAINER_NAME:-ags-notification-service}
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      AUTO_APPLY_MIGRATIONS: ${AUTO_APPLY_MIGRATIONS:-true}
      DATABASE_URL: ${NOTIFICATION_DATABASE_URL:-Host=postgres;Port=5432;Database=ags;Username=ags;Password=ags_password}
      JWT_SECRET: ${JWT_SECRET:-change-me-super-secret-local-dev-only-but-long-enough-123456}
      JWT_ISSUER: ${JWT_ISSUER:-ags}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-ags-api}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev-internal-service-token-change-me}
      IDENTITY_SERVICE_BASE_URL: http://identity-service:8080
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-ags}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-ags_password}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-ags.domain.events}
      NOTIFICATION_EVALUATION_COMPLETED_ROUTING_KEY: ${NOTIFICATION_EVALUATION_COMPLETED_ROUTING_KEY:-evaluation.completed.v1}
      NOTIFICATION_EMAIL_ENABLED: ${NOTIFICATION_EMAIL_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-EvalCore}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      NOTIFICATION_EMAIL_SUBJECT_PREFIX: ${NOTIFICATION_EMAIL_SUBJECT_PREFIX:-[EvalCore]}
    ports:
      - "${NOTIFICATION_PUBLIC_PORT:-8086}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      identity-service:
        condition: service_started
    networks:
      - ags-network
    restart: unless-stopped

  gateway:
    profiles:
      - app
    image: caddy:2.8-alpine
    container_name: ags-gateway
    environment:
      IDENTITY_UPSTREAM: ${IDENTITY_UPSTREAM:-identity-service:8080}
      CLASS_UPSTREAM: ${CLASS_UPSTREAM:-class-service:8080}
      SUBMISSION_UPSTREAM: ${SUBMISSION_UPSTREAM:-submission-service:8080}
      EVALUATION_UPSTREAM: ${EVALUATION_UPSTREAM:-evaluation-service:8080}
      NOTIFICATION_UPSTREAM: ${NOTIFICATION_UPSTREAM:-notification-service:8080}
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      identity-service:
        condition: service_started
      class-service:
        condition: service_started
      submission-service:
        condition: service_started
      evaluation-service:
        condition: service_healthy
      notification-service:
        condition: service_started
    networks:
      - ags-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  dozzle:
    profiles:
      - app
    image: ${DOZZLE_IMAGE:-amir20/dozzle:latest}
    container_name: ${DOZZLE_CONTAINER_NAME:-ags-dozzle}
    ports:
      - "${DOZZLE_PUBLIC_PORT:-9999}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ags-network
    restart: unless-stopped

networks:
  ags-network:
    name: ags-network

volumes:
  ags-postgres-data:
    name: ags-postgres-data
  ags-rabbitmq-data:
    name: ags-rabbitmq-data
  ags-minio-data:
    name: ags-minio-data
